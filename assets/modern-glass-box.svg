<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Glass box minimalist house illustration</title>
<desc id="desc">Hand-painted style illustration of a flat-roofed modern house with large glass walls and a cool grey palette with a blueprint blue accent.</desc>
<defs>
