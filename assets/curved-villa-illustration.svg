<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
<title id="title">Curved wall modern villa illustration</title>
<desc id="desc">A hand-painted style illustration of a single-story modern house with a curved white facade, terracotta front door, large windows, and a small garden, in a warm soft-painted art style.</desc>

<defs>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F7E8D6"/>
    <stop offset="55%" stop-color="#FBF0E2"/>
    <stop offset="100%" stop-color="#FDF7EE"/>
  </linearGradient>
  <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E3DCC8"/>
    <stop offset="100%" stop-color="#D8CFB6"/>
  </linearGradient>
  <linearGradient id="wallShade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#F0E9DD"/>
  </linearGradient>
  <linearGradient id="curveShade" x1="0" y1="0" x2="1" y2="0.3">
    <stop offset="0%" stop-color="#E9DCC4"/>
    <stop offset="100%" stop-color="#D9C9A8"/>
  </linearGradient>
  <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FCE2B8" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#FCE2B8" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="glassReflect" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#BFE0E8"/>
    <stop offset="100%" stop-color="#9CC9D6"/>
  </linearGradient>
</defs>

